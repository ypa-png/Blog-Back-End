locationTemp: D:\Program Files (x86)\Java\apache-tomcat-8.5.51\webapps\uploadTemp
imgServiceUrl: http://localhost:9002/uploadTemp

spring:
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 100MB
      enabled: true
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
#    url: jdbc:mysql://118.31.247.49:3306/chengxuba?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8
#    password: 'Yangbiqiang'
#    username: root
    url: jdbc:mysql://localhost:3306/chengxuba?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8
    password: '123456'
    username: root


      #    druid专属配置
      # 数据源其他配置
    initialSize: 5
    minIdle: 5
    maxActive: 20
    maxWait: 60000
    timeBetweenEvictionRunsMillis: 60000
    minEvictableIdleTimeMillis: 300000
    validationQuery: SELECT 1 FROM DUAL
    testWhileIdle: true
    testOnBorrow: false
    testOnReturn: false
    poolPreparedStatements: true
    #   配置监控统计拦截的filters，去掉后监控界面sql无法统计，'wall'用于防火墙
    filters: stat,wall
    maxPoolPreparedStatementPerConnectionSize: 20
    useGlobalDataSourceStat: true
    connectionProperties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=500

logging:
  config: classpath:log4j2-dev.xml
  level:
    top.yangbq.mapper: DEBUG
mybatis:
  configuration:
    #org.apache.ibatis.logging.stdout.StdOutImpl 控制台打印sql语句方便调试sql语句执行错误
    #org.apache.ibatis.logging.log4j2.Log4j2Impl:这个不在控制台打印查询结果,但是在log4j中打印
    log-impl: org.apache.ibatis.logging.log4j2.Log4j2Impl
